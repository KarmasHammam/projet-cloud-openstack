{% extends "base.html" %}
{% block title %}Nouveau Ticket — Help Desk{% endblock %}
{% block content %}
<div class="main">
    <div class="topbar">
        <div><h1>➕ Nouveau ticket</h1><div class="breadcrumb">Accueil / Tickets / Nouveau</div></div>
    </div>
    <div class="card" style="max-width:700px">
        <div class="card-header">
            <div><div class="card-title">Créer un ticket</div><div class="card-subtitle">Décrivez votre problème</div></div>
        </div>
        {% if msg %}<div style="background:#fdedec;color:#e74c3c;border:1px solid #f1948a;border-radius:8px;padding:10px 14px;margin-bottom:16px">{{ msg }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Titre</label>
                <input type="text" name="titre" class="form-control" placeholder="Ex: Instance Ubuntu ne répond plus..." required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" placeholder="Décrivez le problème..." required></textarea>
            </div>
            <div class="form-group">
                <label>Priorité</label>
                <select name="priorite" class="form-control">
                    <option value="haute">🔴 Haute</option>
                    <option value="moyenne" selected>🟡 Moyenne</option>
                    <option value="basse">🟢 Basse</option>
                </select>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px">
                <button type="submit" class="btn btn-primary">✅ Créer</button>
                <a href="/tickets" class="btn btn-warning">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
